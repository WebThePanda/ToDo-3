<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h1>ToDo</h1>
        <p id="counter"></p>
        <input type="text" id="task-input" placeholder="Skriv en oppgave...">
        <button id="add-btn">Legg til</button>
        <button id="delAll">Drop NUKE</button>
        
        <div id="not-completed">
            <h3>Not Completed Tasks:</h3>
            <ul id="task-list"></ul>
        </div>
        
        <div id="complete">
            <h3>Completed Tasks:</h3>
            <button id="delDone">Delete Finished</button>
            <ul id="completed-tasks"></ul>
        </div>
    </div>
     
    <script src="script.js"></script>
</body>
</html>
